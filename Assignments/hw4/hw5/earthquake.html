<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earthquake Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"
        integrity="sha512-hoalWLoI8r4UszCkZ5kL8vayOGVae1oxXe/2A4AO6J9+580uKHDO3JdHb7NzwwzK5xr/Fs0W40kiNHxM9vyTtQ=="
        crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"
        integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ=="
        crossorigin=""></script>
    <script src="./earthquake.js"></script>
    <style>
        #map { 
            width: 100%;
            height: 500px;
        }
    </style>
</head>
<body>
    <h3 id="demo">Earthquake Info</h3>
    <input id="myRange" type="range" name="Day" min="0" max="99" value="0">
    <div id="map"></div>
    <script>
        
        var map = L.map('map').setView([38, -100], 2); 
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        var earthquakeMarker; 

     
        var slider = document.getElementById("myRange");
        var output = document.getElementById("demo");

        slider.oninput = function() {
            var i = this.value; 
            if (earthquakeData && earthquakeData.features && earthquakeData.features[i]) {
                var feature = earthquakeData.features[i];
                var magnitude = feature.properties.mag;
                var place = feature.properties.place;

               
                output.innerHTML = "Location: " + place + ", Magnitude: " + magnitude;

              
                if (earthquakeMarker) {
                    map.removeLayer(earthquakeMarker);
                }

           
                earthquakeMarker = L.geoJSON(feature, {
                    pointToLayer: function(feature, latlng) {
                        return L.circleMarker(latlng, {
                         });
                    }
                }).addTo(map);
            } 
        };

        
        if (earthquakeData && earthquakeData.features) {
            slider.max = earthquakeData.features.length - 1; // Set max to the number of features
            slider.value = 0; 
            slider.oninput();
        }
    </script>
</body>
</html>
