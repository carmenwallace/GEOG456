<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.8.0/dist/leaflet.css"
   integrity="sha512-hoalWLoI8r4UszCkZ5kL8vayOGVae1oxXe/2A4AO6J9+580uKHDO3JdHb7NzwwzK5xr/Fs0W40kiNHxM9vyTtQ=="
   crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.8.0/dist/leaflet.js"
   integrity="sha512-BB3hKbKWOc9Ez/TAwyWxNXeoV9c1v6FIeYiBieIWkpLjauysF18NzgR1MBNBXf8/KABdlkX68nAhlwcDFLGPCQ=="
   crossorigin=""></script>

   <script src="TOD.js"></script>
</head>
<style>
    #map { 
        width: 100%;
        height: 500px;
         }
</style>
<body>
    <h3 id ="daYear">Year</h3>
    <input id="dateSlider" type = "range" name = "Year" min = "1996" max = "2015" oninput="moveSlider(this.value)">
    <div id="map"></div>
    <script>
        //HW made by Sunwoo Yoon // Edited and annotated by J Arce

        var map = L.map('map').setView([34.0406, -118.2118], 13);
        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);



        var LeafIcon = L.Icon.extend({
            options: {
                iconSize:     [50, 50],
                iconAnchor:   [25, 25],
            }
        })

        var greenIcon = new LeafIcon({iconUrl: 'https://thumbs.dreamstime.com/b/mobile-191030798.jpg'})

        var geojson = L.geoJson(TOD.features.year,{
            pointToLayer: function(year,latlng){
                return L.marker(latlng,{icon: greenIcon})
            }
        })
        .addTo(map);

        function moveSlider(year) { // function called by the slider that uses the value to select one feature, using the index of the feature array. 
        
            //console.log(year)
           // map.removeLayer(geojson);// leaflet method to remove a layer
            document.getElementById('daYear').innerHTML = 'Year ' + year;
            geojson = L.geoJson(TOD,{
                filter: function(feature,latlng){
                    return feature.properties.year == year; 
                },
                pointToLayer: function(feature,latlng){
                    return L.marker(latlng,{icon: greenIcon})
                }
            });
            map.addLayer(geojson) // add the new layer
            
        }
       
        window.onload = function() {
        document.getElementById('dateSlider').value = 1996;  
        moveSlider(1996) // start the map with the first feature
    }; // I added this section to make sure that the slider goes back to the first date after refreshing

    </script>
</body>
</html>
